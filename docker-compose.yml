services:
  postgres:
    image: postgres:16-alpine
    container_name: moviehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moviehub
      POSTGRES_PASSWORD: moviehub
      POSTGRES_DB: moviehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moviehub -d moviehub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
